name: Update papers

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch recent arXiv papers
        run: python3 scripts/fetch_papers.py --output papers.json --days 14 --per-category 30

      - name: Commit updated papers
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update arXiv papers"
          file_pattern: papers.json

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
